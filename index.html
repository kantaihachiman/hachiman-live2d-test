<style>
*{box-sizing:border-box}
:root{--brown:#4b281b;--cream:#fff5dc;--red:#a83229;--green:#3f7a61}
html,body{margin:0;width:100%;height:100%;font-family:"Yu Gothic","Meiryo",sans-serif;background:#20110e;color:var(--cream);overflow:hidden}
.app{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:radial-gradient(circle at 50% 20%,rgba(255,226,145,.18),transparent 34%),
  linear-gradient(180deg,#25120f 0%,#4b281b 50%,#8a581b 100%);
}
.wallPattern{position:absolute;inset:0;opacity:.18;pointer-events:none;background-image:linear-gradient(90deg,rgba(255,244,216,.12) 1px,transparent 1px),linear-gradient(0deg,rgba(255,244,216,.08) 1px,transparent 1px);background-size:38px 38px}
header{position:absolute;z-index:20;top:14px;left:0;right:0;text-align:center;pointer-events:none}
h1{margin:0;font-size:clamp(34px,6vw,68px);letter-spacing:.08em;color:#fff2d2;text-shadow:4px 4px 0 rgba(60,26,16,.85)}
.sub{margin-top:7px;font-weight:900;font-size:clamp(13px,2.2vw,18px);color:#f8dfaa}
#stage{position:absolute;inset:0;width:100vw;height:100vh;z-index:8}
.speech{
  position:absolute;z-index:22;top:128px;right:4vw;width:min(430px,36vw);
  padding:14px 18px;color:#3f2a1e;background:rgba(255,249,232,.96);
  border:4px solid var(--brown);border-radius:18px;box-shadow:7px 7px 0 rgba(0,0,0,.22);
  font-weight:900;line-height:1.65;
}
.speech small{display:block;color:#855e43;margin-bottom:4px;font-size:12px}
.cards{position:absolute;z-index:12;left:50%;bottom:86px;transform:translateX(-50%);width:min(980px,88vw);display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{min-height:110px;padding:16px 14px;border:4px solid var(--brown);border-radius:18px;background:linear-gradient(180deg,#fff8e8,#f2d38b);color:#3c251a;box-shadow:0 8px 0 rgba(62,30,19,.55);text-align:center;font-weight:900;cursor:pointer;user-select:none}
.card:active{transform:translateY(5px);box-shadow:0 3px 0 rgba(62,30,19,.55)}
.card .icon{font-size:30px;margin-bottom:6px}.card .title{font-size:20px}.card .desc{font-size:12px;margin-top:6px;color:#6e4b34}
.counter{position:absolute;z-index:3;left:50%;bottom:0;transform:translateX(-50%);width:min(1040px,100vw);height:120px;border:5px solid var(--brown);border-bottom:0;border-radius:24px 24px 0 0;background:linear-gradient(180deg,#efc466 0 28%,#a76232 28% 100%)}
.floor{position:absolute;z-index:1;left:-10%;right:-10%;bottom:-92px;height:250px;background:repeating-linear-gradient(90deg,#b87938 0 70px,#a86931 70px 76px),linear-gradient(#c48d4f,#8f572b);transform:perspective(600px) rotateX(58deg);transform-origin:bottom;border-top:5px solid #4d2a1a}
button{padding:10px 12px;color:#fff7df;background:var(--red);border:3px solid var(--brown);border-radius:12px;box-shadow:0 4px 0 #5c2219;font-family:inherit;font-weight:900;cursor:pointer}
button:active{transform:translateY(3px);box-shadow:0 1px 0 #5c2219}button.green{background:var(--green);box-shadow:0 4px 0 #254537}
.qrPanel{position:absolute;z-index:32;right:12px;bottom:10px;width:118px;padding:7px;border:3px solid rgba(75,40,27,.82);border-radius:14px;background:rgba(255,249,232,.92);color:#4b281b;box-shadow:4px 4px 0 rgba(0,0,0,.20);text-align:center;font-weight:900}
.qrPanel img{display:block;width:96px;height:96px;margin:0 auto 4px;image-rendering:pixelated}
.qrPanel .qrTitle{font-size:10px;line-height:1.25}
.qrPanel .qrUrl{font-size:8px;line-height:1.1;opacity:.75;word-break:break-all}
@media(max-width:900px){.qrPanel{right:102px;bottom:8px;width:86px;padding:5px;border-radius:12px;opacity:.90}.qrPanel img{width:70px;height:70px;margin-bottom:2px}.qrPanel .qrTitle{font-size:9px}.qrPanel .qrUrl{display:none}}
.versionBadge{position:absolute;z-index:30;left:12px;bottom:10px;padding:5px 9px;border:2px solid rgba(75,40,27,.7);border-radius:999px;background:rgba(255,249,232,.82);color:#4b281b;font-size:11px;font-weight:900;letter-spacing:.04em}
.pcMenu{display:none}
.debugPanel{display:none!important}
.debugPanel.open{display:block}.debugPanel h2{margin:0 0 8px;color:var(--red);font-size:18px}
.status,.readout{padding:8px;border:2px solid #7a4a2c;border-radius:10px;background:#fff4d8;font-weight:900;line-height:1.45;margin-bottom:10px;font-size:12px}
.status small,.readout small{display:block;color:#7a5b42;word-break:break-all}.debugBtns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mobileBar{display:none}
@media(max-width:900px){
  header{top:10px}
  h1{font-size:34px}
  .sub{font-size:12px;margin-top:3px}

  .speech{

    width:auto;
    min-height:74px;
    padding:11px 13px;
    font-size:13px;
    line-height:1.55;
    border-radius:17px;
  }

  .cards{display:none}
  .pcMenu{display:none}

  .counter{
    height:66px;

    left:38%;
    bottom:28px;
    border-radius:18px 18px 0 0;

  }

  .floor{
    bottom:-84px;
    height:205px;
  }

  .mobileBar{
    display:flex;
    position:fixed;
    z-index:60;
    right:8px;
    bottom:18px;
    width:86px;
    flex-direction:column;
    gap:7px;
  }

  .mobileBar button{
    flex:none;

    min-height:54px;
    padding:8px 5px;
    font-size:13px;
    border-radius:14px;
  }
  .mobileBar button.disabled{
    opacity:.48;
    filter:grayscale(100%);
    cursor:not-allowed;
  }
  .mobileBar small{
    font-size:10px;
    line-height:1;
  }

  .debugPanel{
    left:10px;
    right:10px;
    top:92px;
    width:auto;
    max-height:calc(100vh - 150px);
  }
}

function timeGreeting(){
  const h=new Date().getHours();
  if(h>=5&&h<10)return "おはようございますなのです。今日も艦隊八幡社へようこそなのです。";
  if(h>=10&&h<15)return "こんにちはなのです。お昼の店番中なのです。";
  if(h>=15&&h<18)return "夕方が近いのです。少し涼しくなるとよいのです。";
  if(h>=18&&h<23)return "こんばんはなのです。夜の艦隊八幡社も開いているのです。";
  return "夜更かしはほどほどになのです。無理せず休んでほしいのです。";
}

function todayLine(){
  const now=new Date();
  const days=["日","月","火","水","木","金","土"];
  const m=now.getMonth()+1;
  const d=now.getDate();
  const w=days[now.getDay()];
  return "今日は"+m+"月"+d+"日、"+w+"曜日なのです。";
}

function dailyTopicLine(){
  const now=new Date();
  const day=now.getDay();
  const date=now.getDate();

  if(day===5){
    return "今日は金曜日、カレーの日なのです。はちまんも楽しみなのです。";
  }
  if(date===8){
    return "今日は八のつく日なのです。艦隊八幡社には、少し縁起が良い気がするのです。";
  }
  if(date===18 || date===28){
    return "今日は八の気配が強い日なのです。よいことがあるかもしれないのです。";
  }
  if(day===0){
    return "日曜日なのです。ゆっくり艦隊八幡社を見ていってほしいのです。";
  }
  if(day===6){
    return "土曜日なのです。お出かけの前に、少し寄っていくのです。";
  }
  return todayLine()+"艦隊八幡社は本日も開店中なのです。";
}

  return touchLines[Math.floor(Math.random()*touchLines.length)];
}

function formatNumber(n){
  return Number(n||0).toLocaleString("ja-JP");
}

function safeName(name){
  const s=String(name||"名無しの参拝者").trim();
  return s || "名無しの参拝者";
}

function rankingApiUrl(){
  return RANKING_URL_OVERRIDE || RANKING_API_URL;
}

async function loadRanking(){
  const api=rankingApiUrl();
  if(!api)return false;

  try{
    const sep=api.includes("?") ? "&" : "?";
    const url=api + sep + "difficulty=normal&limit=5";
    const res=await fetch(url,{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();

    if(data && data.ok && Array.isArray(data.entries)){
      rankingEntries=data.entries;
      rankingLoadedAt=Date.now();
      if(rankingEntries.length===0 && typeof speechText!=="undefined"){
        speechText.textContent="ランキングは読めましたが、表示する記録がまだ無いようなのです。";
      }
      return true;
    }
  }catch(err){
    console.warn("ranking load failed",err);
    if(typeof speechText!=="undefined"){
      speechText.textContent="ランキングの読み込みに失敗したのです。通信設定を確認してほしいのです。";
    }
  }
  return false;
}

function rankingLine(){
  if(!rankingEntries || rankingEntries.length===0)return "";
  const top=rankingEntries[0];
  const name=safeName(top.name);
  const sales=formatNumber(top.sales);
  const difficulty=top.difficulty || top.difficultyKey || "ふつう";
  return "現在の売上一位は、" + name + "さんなのです。" + sales + "文、難易度は" + difficulty + "なのです。";
}

function rankingTop3Line(){
  if(!rankingEntries || rankingEntries.length===0)return "";
  const top3=rankingEntries.slice(0,3);
  const parts=top3.map((entry,idx)=>{
    const rank=idx+1;
    const name=safeName(entry.name);
    const difficulty=entry.difficulty || entry.difficultyKey || "ふつう";
    return "・" + rank + "位　" + name + "さん　難易度 " + difficulty;
  });
  return ["現在の売上ランキングなのです。", ...parts, "皆さまの商い、見事なのです。"].join("\n");
}

function weatherCodeText(code){
  const c=Number(code);
  if(c===0)return "快晴";
  if([1,2,3].includes(c))return "くもり気味";
  if([45,48].includes(c))return "霧";
  if([51,53,55,56,57].includes(c))return "小雨";
  if([61,63,65,66,67].includes(c))return "雨";
  if([71,73,75,77].includes(c))return "雪";
  if([80,81,82].includes(c))return "にわか雨";
  if([95,96,99].includes(c))return "雷雨";
  return "変わりやすい天気";
}

async function loadWeather(){
  try{
    const url="https://api.open-meteo.com/v1/forecast"
      + "?latitude=" + encodeURIComponent(WEATHER_LAT)
      + "&longitude=" + encodeURIComponent(WEATHER_LON)
      + "&current=temperature_2m,weather_code"
      + "&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max"
      + "&timezone=Asia%2FTokyo";
    const res=await fetch(url,{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();

    weatherInfo={
      temp:data.current && data.current.temperature_2m,
      code:data.current && data.current.weather_code,
      max:data.daily && data.daily.temperature_2m_max && data.daily.temperature_2m_max[0],
      min:data.daily && data.daily.temperature_2m_min && data.daily.temperature_2m_min[0],
      rain:data.daily && data.daily.precipitation_probability_max && data.daily.precipitation_probability_max[0]
    };
    weatherLoadedAt=Date.now();
    return true;
  }catch(err){
    console.warn("weather load failed",err);
  }
  return false;
}

function weatherLine(){
  if(!weatherInfo)return "";
  const weather=weatherCodeText(weatherInfo.code);
  const temp=Math.round(Number(weatherInfo.temp));
  const max=Math.round(Number(weatherInfo.max));
  const min=Math.round(Number(weatherInfo.min));
  const rain=Number(weatherInfo.rain);

  let line=WEATHER_LABEL+"の今の天気は"+weather+"なのです。気温は"+temp+"度なのです。";
  if(Number.isFinite(max)&&Number.isFinite(min)){
    line+="今日の最高気温は"+max+"度、最低気温は"+min+"度くらいなのです。";
  }
  if(Number.isFinite(rain)){
    if(rain>=50)line+="雨が降るかもしれないので、傘があると安心なのです。";
    else if(max>=28)line+="暑くなりそうなので、水分補給してほしいのです。";
    else line+="お出かけしやすそうなのです。";
  }
  return line;
}

function randomShopkeeperLine(){
  const r=Math.random();
  if(r<0.18){
    return dailyTopicLine();
  }
  if(rankingEntries.length && r<0.42){
    return Math.random()<0.60 ? rankingTop3Line() : rankingLine();
  }
  if(weatherInfo && r<0.64){
    return weatherLine();
  }
  return idleLines[Math.floor(Math.random()*idleLines.length)];
}

function setStatus(t,d){if(!statusEl)return;statusEl.innerHTML=t+"<small>モデルパス："+MODEL_PATH+"</small>"+(d?"<small>"+d+"</small>":"")}
function getClass(){if(window.PIXI&&PIXI.live2d&&PIXI.live2d.Live2DModel)return PIXI.live2d.Live2DModel;if(window.Live2DModel)return window.Live2DModel;if(window.PIXI&&PIXI.Live2DModel)return PIXI.Live2DModel;return null}
function idToString(id){if(id==null)return"";if(typeof id==="string")return id;if(id.s)return id.s;if(id.id)return id.id;if(id._id)return id._id;if(id.toString)return id.toString();return String(id)}
function collectParams(){core=model&&model.internalModel&&model.internalModel.coreModel;const out=[];try{if(core&&core.getParameterCount&&core.getParameterId){for(let i=0;i<core.getParameterCount();i++)out.push({index:i,id:idToString(core.getParameterId(i))})}}catch(e){}return out.filter(p=>p.id)}
function findParam(id){return params.find(p=>p.id===id)}
function setParam(id,val){
  const p=findParam(id);
  try{if(core&&core.setParameterValueById)core.setParameterValueById(id,Number(val))}catch(e){}
  try{if(p&&core&&core.setParameterValue)core.setParameterValue(p.index,Number(val))}catch(e){}
}
function getParam(id){
  const p=findParam(id);
  try{if(core&&core.getParameterValueById)return Number(core.getParameterValueById(id))}catch(e){}
  try{if(p&&core&&core.getParameterValue)return Number(core.getParameterValue(p.index))}catch(e){}
  return NaN;
}
function applyValues(){
  Object.keys(v).forEach(id=>setParam(id,v[id]));
  const lines=[
    "Param 右腕： "+getParam("Param").toFixed(2),
    "Param2 左腕： "+getParam("Param2").toFixed(2),
    "口開閉： "+getParam("ParamMouthOpenY").toFixed(2),
    "口変形： "+getParam("ParamMouthForm").toFixed(2),
    "action： "+(action?action.name:"idle"),
    "params： "+params.length
  ];
  if(readout)readout.innerHTML=lines.map(x=>"<small>"+x+"</small>").join("");
}
function placeModel(){
  if(!model||!app)return;
  const w=app.renderer.width,h=app.renderer.height;
  if(window.innerWidth<=900){
    model.scale.set(0.055);
    model.x=172;
    model.y=492;
  }
  else{
    model.scale.set(0.220);
    model.x=w*0.50;
    model.y=h*0.70;
  }
  if(model.anchor)model.anchor.set(0.5,0.92);
}
function speak(text,duration=1700){speechText.textContent=text;mouthUntil=performance.now()+duration}
function startAction(name,text){action={name,start:performance.now()};if(text)speak(text,1800)}
function stopAction(){action=null;placeModel()}
function randomAuto(){
  const r=Math.random();
  if(r<.32)speak(randomShopkeeperLine(),1900);
  else if(r<.50)startAction("look",null);
  else if(r<.68)startAction("jump","ぴょこっと店番するのです。");
  else if(r<.84)startAction("wave","こちらへどうぞなのです。");
  else startAction("bow","よろしくお願いいたしますなのです。");
  nextAutoAt=performance.now()+3500+Math.random()*4200;
}
function zeroValues(){
  Object.keys(v).forEach(k=>v[k]=0);
}
function updateMotion(){
  const now=performance.now(), t=now/1000;
  zeroValues();

  // idle base
  v.ParamBreath=Math.sin(t*2.0)*0.45;
  v.ParamBodyAngleZ=Math.sin(t*1.15)*2.2;
  v.ParamBodyAngleX=Math.sin(t*.55)*1.0;
  v.ParamAngleZ=Math.sin(t*1.15)*0.9;
  v.ParamAngleX=Math.sin(t*.8)*1.1;
  v.ParamAngleY=Math.sin(t*.9)*1.0;
  v.ParamEyeBallX=v.ParamAngleX/30;
  v.ParamEyeBallY=v.ParamAngleY/30;
  // 通常時は両腕を下げ気味に固定
  v.Param=-24+Math.sin(t*1.25+.8)*0.7;
  v.Param2=-24+Math.sin(t*1.3)*0.7;

  // mouth
  if(now<mouthUntil){v.ParamMouthOpenY=(Math.sin(t*18)>0)?1.0:0.12;v.ParamMouthForm=Math.sin(t*8)*0.65}
  else{v.ParamMouthOpenY=0;v.ParamMouthForm=0}

  if(action){
    const a=(now-action.start)/1000;
    if(action.name==="jump"){
      const b=Math.max(0,Math.sin(a*Math.PI*2.2));
      const baseY=window.innerWidth<=900?492:app.renderer.height*.70;
      model.y=baseY-b*(window.innerWidth<=900?14:30);
      model.scale.y=model.scale.x*(1+b*.05);
      v.ParamBodyAngleY=b*7; v.Param=-24+b*18; v.Param2=-24+b*18;
      if(a>1.1){model.scale.y=model.scale.x;stopAction()}
    }
    if(action.name==="wave"){
      const b=Math.sin(a*10);
      v.Param=10+b*16;
      v.Param2=-24+Math.sin(a*5)*4;
      v.ParamBodyAngleZ=Math.sin(a*4)*5;
      v.ParamAngleZ=Math.sin(a*4)*2.5;
      if(a>1.8)stopAction();
    }
    if(action.name==="bow"){
      const b=Math.sin(Math.min(1,a/1.25)*Math.PI);
      v.ParamAngleY=-12*b; v.ParamBodyAngleX=-7*b;
      v.Param=-24+8*b; v.Param2=-24+8*b;
      if(a>1.35)stopAction();
    }
    if(action.name==="look"){
      v.ParamAngleX=Math.sin(a*2)*8;
      v.ParamAngleY=Math.cos(a*2)*5;
      v.ParamEyeBallX=v.ParamAngleX/30;v.ParamEyeBallY=v.ParamAngleY/30;
      if(a>2.1)stopAction();
    }
    if(action.name==="right"){
      const b=Math.sin(Math.min(1,a/1.2)*Math.PI);v.Param=30*b;if(a>1.3)stopAction();
    }
    if(action.name==="left"){
      const b=Math.sin(Math.min(1,a/1.2)*Math.PI);v.Param2=30*b;if(a>1.3)stopAction();
    }
    if(action.name==="mouth"){
      v.ParamMouthOpenY=(Math.sin(a*16)>0)?1:0;v.ParamMouthForm=Math.sin(a*8);if(a>2.2)stopAction();
    }
  }

  if(autoMode&&now>nextAutoAt)randomAuto();
  applyValues();
}
function tick(){requestAnimationFrame(tick);if(model)updateMotion()}
async function init(){
  try{
    const C=getClass();if(!C)throw new Error("Live2DModel クラスが見つかりません。");
    app=new PIXI.Application({view:canvas,resizeTo:window,transparent:true,autoDensity:false,resolution:1});
    setStatus("Live2Dモデルを読み込み中……");
    model=await C.from(MODEL_PATH,{autoInteract:false});
    app.stage.addChild(model);
    if(model.anchor)model.anchor.set(0.5,0.92);
    params=collectParams();placeModel();
    setStatus("読み込み成功。v1.3aga 公開版です。","取得パラメータ："+params.length+"件");
    speak(timeGreeting(),2300);
    setTimeout(()=>speak(dailyTopicLine(),3000),2500);

    loadRanking().then(ok=>{
      if(ok && rankingEntries.length){
        setTimeout(()=>speak(rankingTop3Line(),3600),6100);
      }
    });

    loadWeather().then(ok=>{
      if(ok && weatherInfo){
        setTimeout(()=>speak(weatherLine(),3600),10100);
      }
    });

    nextAutoAt=performance.now()+14500;
    window.addEventListener("resize",placeModel);
    tick();
  }catch(e){console.error(e);setStatus("読み込み失敗："+e.message);speechText.textContent="Live2Dの読み込みに失敗したのです。"}
}
function openHachimanShop(){
  startAction("wave","はちまん売店はこちらなのです。");
  setTimeout(()=>{ window.location.href="https://kantaihachiman.github.io/izumo-game/"; },900);
}

function openSlotGame(){
  startAction("jump","CRいずもちゃんはこちらなのです。");
  setTimeout(()=>{ window.location.href="https://kantaihachiman.github.io/slot-game/"; },900);
}

document.querySelectorAll(".card").forEach(card=>{
  card.onclick=()=>{
    if(card.dataset.action==="shopLink"){openHachimanShop();return;}
    if(card.dataset.action==="guide"){
      let line="";
      if(rankingEntries.length && Math.random()<0.55){line=rankingTop3Line();}
      else if(weatherInfo && Math.random()<0.45){line=weatherLine();}
      else{line=dailyTopicLine();}
      startAction("jump",line);
      return;
    }
    if(card.dataset.action==="slotLink"){openSlotGame();return;}
    if(card.dataset.action==="gameSoon"){startAction("bow","CRいずもちゃんは準備中なのです。もう少し待ってほしいのです。");return;}
    startAction(card.dataset.action,card.dataset.say);
  };
});
document.getElementById("autoBtn").onclick=()=>{autoMode=!autoMode;speak(autoMode?"自動店番を再開したのです。":"自動店番を一時停止したのです。")};
document.getElementById("debugBtn").onclick=()=>{};
document.querySelector("header").addEventListener("dblclick",()=>{});

document.getElementById("testLeftBtn").onclick=()=>startAction("left","左腕テストなのです。");

document.getElementById("mShopBtn").onclick=()=>openHachimanShop();

function openMainGame(){
  window.location.href="https://kantaihachiman.github.io/main-game/";
}

const headerQRBtn=document.getElementById("headerQRBtn");
if(headerQRBtn){
  headerQRBtn.onclick=(ev)=>{
    ev.stopPropagation();
    if(typeof startAction==="function"){
      startAction("jump","八界のイザナミ、テスト版はこちらなのです。");

document.querySelector(".app").addEventListener("pointerdown",(e)=>{
  if(e.target.closest("button")||e.target.closest(".card")||e.target.closest(".debugPanel"))return;
  startAction("jump",randomTouchLine());

init();
