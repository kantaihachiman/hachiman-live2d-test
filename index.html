<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はちまん Live2D パラメータ調査 v0.4</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:"Yu Gothic","Meiryo",sans-serif;color:#fff7df;background:radial-gradient(circle at 50% 18%,rgba(255,227,142,.18),transparent 34%),linear-gradient(180deg,#251714 0%,#56321f 55%,#9b6517 100%)}
.wrap{position:relative;width:100vw;min-height:100vh;overflow:hidden}
header{position:absolute;z-index:5;left:0;right:0;top:0;padding:14px 16px;text-align:center;pointer-events:none}
h1{margin:0;font-size:clamp(25px,4.6vw,50px);letter-spacing:.08em;text-shadow:3px 3px 0 #3b2015}
.sub{margin-top:6px;font-weight:800;opacity:.92}
#stage{position:absolute;inset:0;width:100vw;height:100vh}
.floor{position:absolute;left:-10%;right:-10%;bottom:-78px;height:260px;background:repeating-linear-gradient(90deg,#b87938 0 70px,#a86931 70px 76px),linear-gradient(#c48d4f,#8f572b);transform:perspective(520px) rotateX(58deg);transform-origin:bottom;border-top:5px solid #4d2a1a;z-index:1;pointer-events:none}
.counter{position:absolute;z-index:2;left:50%;bottom:44px;transform:translateX(-50%);width:min(680px,70vw);height:104px;border:5px solid #3b2015;border-radius:18px 18px 8px 8px;background:linear-gradient(180deg,#f1c36a 0 25%,#a85f31 25% 100%);box-shadow:0 12px 0 rgba(52,27,17,.45);pointer-events:none}
.sign{position:absolute;z-index:6;left:50%;bottom:125px;transform:translateX(-50%);padding:9px 20px;min-width:220px;text-align:center;color:#3f2a1e;border:4px solid #4d2a1a;background:#fff4d8;font-size:clamp(19px,3.4vw,30px);font-weight:900;letter-spacing:.08em;box-shadow:5px 5px 0 rgba(0,0,0,.18);pointer-events:none}
.speech{position:absolute;z-index:9;right:24px;top:112px;width:min(400px,34vw);min-height:92px;padding:14px 16px;color:#3f2a1e;background:#fff9e8;border:4px solid #4d2a1a;border-radius:18px;box-shadow:6px 6px 0 rgba(0,0,0,.18);font-weight:900;line-height:1.55}
.speech small{display:block;color:#7a5b42;margin-bottom:4px}
.panel{position:absolute;z-index:20;left:14px;top:112px;width:360px;max-height:calc(100vh - 132px);overflow:auto;padding:12px;color:#3f2a1e;background:rgba(255,249,232,.96);border:4px solid #4d2a1a;border-radius:16px;box-shadow:7px 7px 0 rgba(0,0,0,.22)}
.panel h2{margin:0 0 8px;font-size:18px;color:#9f2f26}
.status{padding:8px;border:2px solid #7a4a2c;border-radius:10px;background:#fff4d8;font-weight:900;line-height:1.45;margin-bottom:10px}
.status small{display:block;color:#7a5b42;word-break:break-all}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
button{padding:9px 10px;color:#fff7df;background:#9f2f26;border:3px solid #4d2a1a;border-radius:10px;box-shadow:0 3px 0 #5c2219;font-family:inherit;font-weight:900;cursor:pointer}
button:active{transform:translateY(2px);box-shadow:0 1px 0 #5c2219}
button.subbtn{background:#3f735d;box-shadow:0 3px 0 #254537}
.paramTools{display:flex;gap:6px;margin:8px 0;align-items:center}
.paramTools input{width:100%;padding:7px;border:2px solid #7a4a2c;border-radius:8px;background:white;font-weight:800}
.param{padding:8px;margin:7px 0;border:2px solid #7a4a2c;border-radius:10px;background:#fffdf3}
.param b{display:block;font-size:12px;color:#3f2a1e;word-break:break-all}
.param .row{display:grid;grid-template-columns:1fr 54px;gap:8px;align-items:center;margin-top:6px}
.param input[type=range]{width:100%}
.param output{font-size:12px;text-align:right;font-weight:900}
.note{font-size:12px;line-height:1.5;color:#6b4b35;font-weight:800}
.hide{display:none}
@media(max-width:900px){
  body{overflow:auto}.wrap{min-height:1120px;overflow:visible}#stage{height:720px}
  .panel{position:relative;left:auto;top:auto;width:calc(100% - 20px);max-height:none;margin:740px auto 16px}
  .speech{left:16px;right:16px;top:92px;width:auto;font-size:13px}
  .counter{bottom:92px;width:min(640px,86vw)}
  .sign{bottom:172px}
}
</style>
</head>
<body>
<div class="wrap">
<header><h1>艦隊八幡社</h1><div class="sub">Live2D パラメータ調査・モーション確認 v0.4</div></header>
<canvas id="stage"></canvas>
<div class="floor"></div><div class="counter"></div><div class="sign">艦隊八幡社</div>

<div class="speech"><small>はちまん</small><span id="speechText">動きの確認をしますのです。ボタンを押してみてほしいのです。</span></div>

<section class="panel">
  <h2>動作確認パネル</h2>
  <div class="status" id="status">読み込み準備中……<small>モデルパス：export/hachiman.model3.json</small></div>

  <div class="btns">
    <button id="idleBtn" class="subbtn">待機ゆれ</button>
    <button id="stopBtn">停止</button>
    <button id="bowBtn">おじぎ</button>
    <button id="waveBtn">手をふる</button>
    <button id="swayBtn">左右ゆれ</button>
    <button id="jumpBtn">ぴょこ</button>
    <button id="breathBtn">呼吸強め</button>
    <button id="resetParamBtn">パラメータ初期化</button>
    <button id="smallBtn">小さく</button>
    <button id="bigBtn">大きく</button>
  </div>

  <h2>パラメータ一覧</h2>
  <div class="note">モデル内のパラメータを自動取得して表示します。スライダーで直接値を変更できます。</div>
  <div class="paramTools"><input id="filter" placeholder="例：Arm / Body / Breath / Angle"></div>
  <div id="paramList"></div>
</section>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const MODEL_PATH="export/hachiman.model3.json";
const statusEl=document.getElementById("status");
const speechText=document.getElementById("speechText");
const canvas=document.getElementById("stage");
const paramListEl=document.getElementById("paramList");
const filterEl=document.getElementById("filter");

let app=null,model=null,core=null,baseScale=0.26;
let params=[];
let defaultValues={};
let activeAnim=null;
let rafId=null;

function setStatus(text,detail){
  statusEl.innerHTML=text+"<small>モデルパス："+MODEL_PATH+"</small>"+(detail?"<small>"+detail+"</small>":"");
}

function getLive2DModelClass(){
  if(window.PIXI && PIXI.live2d && PIXI.live2d.Live2DModel) return PIXI.live2d.Live2DModel;
  if(window.Live2DModel) return window.Live2DModel;
  if(window.PIXI && PIXI.Live2DModel) return PIXI.Live2DModel;
  return null;
}

function idToString(id){
  if(id==null)return "";
  if(typeof id==="string")return id;
  if(id.s)return id.s;
  if(id.id)return id.id;
  if(id._id)return id._id;
  if(id.toString)return id.toString();
  return String(id);
}

function collectParams(){
  core=model && model.internalModel && model.internalModel.coreModel;
  const out=[];

  try{
    if(core && typeof core.getParameterCount==="function" && typeof core.getParameterId==="function"){
      const n=core.getParameterCount();
      for(let i=0;i<n;i++){
        out.push({index:i,id:idToString(core.getParameterId(i))});
      }
    }
  }catch(e){}

  const candidates=[
    core && core._parameterIds,
    core && core.parameterIds,
    core && core.parameters && core.parameters.ids,
    core && core._model && core._model.parameters && core._model.parameters.ids,
    model && model.internalModel && model.internalModel.settings && model.internalModel.settings.parameters
  ];

  candidates.forEach(c=>{
    if(!c)return;
    if(Array.isArray(c)){
      c.forEach((x,i)=>{
        const id=typeof x==="object" && x.id ? x.id : idToString(x);
        if(id && !out.some(p=>p.id===id)) out.push({index:i,id});
      });
    }
  });

  return out.filter(p=>p.id);
}

function getParamValue(id,index){
  try{
    if(core && typeof core.getParameterValueById==="function") return Number(core.getParameterValueById(id));
  }catch(e){}
  try{
    if(core && typeof core.getParameterValue==="function") return Number(core.getParameterValue(index));
  }catch(e){}
  try{
    const values=core && core._model && core._model.parameters && core._model.parameters.values;
    if(values && values[index]!=null) return Number(values[index]);
  }catch(e){}
  return 0;
}

function setParamValue(id,value,index){
  value=Number(value);
  try{
    if(core && typeof core.setParameterValueById==="function"){
      core.setParameterValueById(id,value);
      return;
    }
  }catch(e){}
  try{
    if(core && typeof core.setParameterValue==="function"){
      core.setParameterValue(index,value);
      return;
    }
  }catch(e){}
  try{
    const values=core && core._model && core._model.parameters && core._model.parameters.values;
    if(values && values[index]!=null) values[index]=value;
  }catch(e){}
}

function findParam(words){
  const lowerWords=words.map(w=>w.toLowerCase());
  return params.find(p=>{
    const id=p.id.toLowerCase();
    return lowerWords.every(w=>id.includes(w));
  });
}

function setP(words,value){
  const p=findParam(words);
  if(p) setParamValue(p.id,value,p.index);
}

function addP(words,value){
  const p=findParam(words);
  if(p) setParamValue(p.id,getParamValue(p.id,p.index)+value,p.index);
}

function refreshOutputs(){
  params.forEach(p=>{
    const out=document.getElementById("out_"+p.safe);
    const range=document.getElementById("range_"+p.safe);
    if(out && range){
      const v=getParamValue(p.id,p.index);
      out.value=v.toFixed(2);
      range.value=Math.max(-30,Math.min(30,v));
    }
  });
}

function renderParams(){
  const q=filterEl.value.trim().toLowerCase();
  paramListEl.innerHTML=params.map(p=>{
    const visible=!q || p.id.toLowerCase().includes(q);
    const v=getParamValue(p.id,p.index);
    return `<div class="param ${visible?'':'hide'}">
      <b>${p.id}</b>
      <div class="row">
        <input id="range_${p.safe}" type="range" min="-30" max="30" step="0.1" value="${v}">
        <output id="out_${p.safe}">${v.toFixed(2)}</output>
      </div>
    </div>`;
  }).join("");

  params.forEach(p=>{
    const range=document.getElementById("range_"+p.safe);
    const out=document.getElementById("out_"+p.safe);
    if(range){
      range.addEventListener("input",()=>{
        stopAnim(false);
        setParamValue(p.id,range.value,p.index);
        out.value=Number(range.value).toFixed(2);
      });
    }
  });
}

function resetParams(){
  params.forEach(p=>{
    if(defaultValues[p.id]!=null) setParamValue(p.id,defaultValues[p.id],p.index);
  });
  refreshOutputs();
}

function placeModel(){
  if(!model || !app)return;
  const w=app.renderer.width;
  const h=app.renderer.height;
  const scale=Math.min(w/900,h/900)*baseScale;
  model.scale.set(scale);
  model.x=w*0.5;
  model.y=h*0.80;
}

function stopAnim(reset=true){
  activeAnim=null;
  if(reset) resetParams();
  speechText.textContent="停止しましたのです。";
}

function startAnim(name){
  activeAnim={name,start:performance.now()};
  speechText.textContent={
    idle:"待機ゆれ確認中なのです。",
    bow:"おじぎ確認中なのです。",
    wave:"手をふる確認中なのです。",
    sway:"左右ゆれ確認中なのです。",
    jump:"ぴょこ確認中なのです。",
    breath:"呼吸強め確認中なのです。"
  }[name]||"確認中なのです。";
}

function animate(){
  rafId=requestAnimationFrame(animate);
  if(!activeAnim)return;

  const t=(performance.now()-activeAnim.start)/1000;
  resetParams();

  if(activeAnim.name==="idle"){
    setP(["breath"],Math.sin(t*2.2)*0.7);
    setP(["body","angle","z"],Math.sin(t*1.4)*3);
    setP(["angle","z"],Math.sin(t*1.2)*2);
  }

  if(activeAnim.name==="bow"){
    const phase=Math.min(1,t/1.2);
    const v=Math.sin(phase*Math.PI)*18;
    setP(["angle","y"],-v);
    setP(["body","angle","x"],v*0.35);
    setP(["breath"],v*0.04);
    if(t>1.35) stopAnim(true);
  }

  if(activeAnim.name==="wave"){
    setP(["body","angle","z"],Math.sin(t*5.0)*4);
    setP(["angle","z"],Math.sin(t*5.0)*3);
    setP(["arm","r"],Math.sin(t*10)*24);
    setP(["arm","right"],Math.sin(t*10)*24);
    setP(["arm","l"],Math.sin(t*7)*6);
    if(t>2.4) stopAnim(true);
  }

  if(activeAnim.name==="sway"){
    setP(["body","angle","x"],Math.sin(t*3.2)*12);
    setP(["angle","x"],Math.sin(t*3.2)*10);
    setP(["angle","z"],Math.sin(t*3.2)*5);
  }

  if(activeAnim.name==="jump"){
    const bounce=Math.max(0,Math.sin(t*7))*1.0;
    setP(["breath"],bounce*2.0);
    setP(["body","angle","y"],bounce*10);
    setP(["angle","y"],bounce*7);
    if(model){
      model.y=(app.renderer.height*0.80)-(bounce*38);
      model.scale.y=model.scale.x*(1+bounce*0.08);
    }
    if(t>1.5){
      if(model) model.scale.y=model.scale.x;
      placeModel();
      stopAnim(true);
    }
  }

  if(activeAnim.name==="breath"){
    setP(["breath"],Math.sin(t*4)*1.8);
    setP(["body","angle","y"],Math.sin(t*4)*4);
  }

  refreshOutputs();
}

async function init(){
  try{
    const Live2DModel=getLive2DModelClass();
    if(!Live2DModel) throw new Error("Live2DModel クラスが見つかりません。");

    app=new PIXI.Application({view:canvas,resizeTo:window,transparent:true,autoDensity:true,resolution:window.devicePixelRatio||1});
    setStatus("Live2Dモデルを読み込み中……");
    model=await Live2DModel.from(MODEL_PATH,{autoInteract:true});
    app.stage.addChild(model);

    if(model.anchor) model.anchor.set(0.5,0.92);
    placeModel();

    params=collectParams().map((p,i)=>({...p,safe:"p"+i+"_"+p.id.replace(/[^a-zA-Z0-9_-]/g,"_")}));
    params.forEach(p=>defaultValues[p.id]=getParamValue(p.id,p.index));

    renderParams();
    animate();

    if(model.on){
      model.on("hit",(hitAreas)=>{
        speechText.textContent="触られましたのです。そこは "+hitAreas.join(", ")+" なのです。";
      });
    }

    window.addEventListener("resize",placeModel);
    setStatus("読み込み成功。パラメータ "+params.length+" 件を取得しました。");
    speechText.textContent="表示成功なのです。動きの確認を始められますのです。";
  }catch(error){
    console.error(error);
    setStatus("読み込み失敗："+error.message);
    speechText.textContent="Live2Dの読み込みに失敗したのです。";
  }
}

filterEl.addEventListener("input",renderParams);
document.getElementById("idleBtn").addEventListener("click",()=>startAnim("idle"));
document.getElementById("stopBtn").addEventListener("click",()=>stopAnim(true));
document.getElementById("bowBtn").addEventListener("click",()=>startAnim("bow"));
document.getElementById("waveBtn").addEventListener("click",()=>startAnim("wave"));
document.getElementById("swayBtn").addEventListener("click",()=>startAnim("sway"));
document.getElementById("jumpBtn").addEventListener("click",()=>startAnim("jump"));
document.getElementById("breathBtn").addEventListener("click",()=>startAnim("breath"));
document.getElementById("resetParamBtn").addEventListener("click",()=>{stopAnim(true);speechText.textContent="初期化しましたのです。"});
document.getElementById("smallBtn").addEventListener("click",()=>{baseScale=Math.max(0.12,baseScale-0.04);placeModel()});
document.getElementById("bigBtn").addEventListener("click",()=>{baseScale=Math.min(0.7,baseScale+0.04);placeModel()});

init();
</script>
</body>
</html>
