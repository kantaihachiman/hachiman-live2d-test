<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艦隊八幡社 Live2D パラメータ直接テスト v0.9b</title>
<style>
*{box-sizing:border-box}
:root{
  --brown:#4b281b;
  --cream:#fff5dc;
  --red:#a83229;
  --green:#3f7a61;
}
html,body{
  margin:0;width:100%;height:100%;
  font-family:"Yu Gothic","Meiryo",sans-serif;
  background:#20110e;color:var(--cream);
  overflow:hidden;
}
.app{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:
    radial-gradient(circle at 50% 20%,rgba(255,226,145,.18),transparent 34%),
    linear-gradient(180deg,#25120f 0%,#4b281b 50%,#8a581b 100%);
}
header{
  position:absolute;z-index:20;top:12px;left:0;right:0;text-align:center;
}
h1{
  margin:0;font-size:clamp(30px,5vw,58px);letter-spacing:.08em;
  color:#fff2d2;text-shadow:4px 4px 0 rgba(60,26,16,.85);
}
.sub{margin-top:6px;font-weight:900;color:#f8dfaa}
#stage{position:absolute;inset:0;width:100vw;height:100vh;z-index:5}
.speech{
  position:absolute;z-index:22;top:110px;right:4vw;width:min(440px,38vw);
  padding:12px 16px;color:#3f2a1e;background:#fff9ea;
  border:4px solid var(--brown);border-radius:18px;
  box-shadow:7px 7px 0 rgba(0,0,0,.22);
  font-weight:900;line-height:1.55;
}
.speech small{display:block;color:#855e43;margin-bottom:4px;font-size:12px}
.panel{
  position:absolute;z-index:40;left:14px;top:110px;width:390px;
  max-height:calc(100vh - 130px);overflow:auto;
  padding:12px;color:#3f2a1e;background:rgba(255,249,232,.97);
  border:4px solid var(--brown);border-radius:16px;
  box-shadow:7px 7px 0 rgba(0,0,0,.22);
}
.panel h2{margin:0 0 8px;color:var(--red);font-size:18px}
.status,.readout{
  padding:8px;border:2px solid #7a4a2c;border-radius:10px;
  background:#fff4d8;font-weight:900;line-height:1.45;margin-bottom:10px;font-size:12px;
}
.status small,.readout small{display:block;color:#7a5b42;word-break:break-all}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
button{
  padding:9px 8px;color:#fff7df;background:var(--red);
  border:3px solid var(--brown);border-radius:10px;
  box-shadow:0 3px 0 #5c2219;
  font-family:inherit;font-weight:900;cursor:pointer;
}
button.green{background:var(--green);box-shadow:0 3px 0 #254537}
button:active{transform:translateY(2px);box-shadow:0 1px 0 #5c2219}
.control{
  padding:8px;border:2px solid #7a4a2c;border-radius:10px;background:#fffdf3;margin-bottom:8px;
}
.control b{display:block;font-size:13px;margin-bottom:5px}
.row{display:grid;grid-template-columns:1fr 58px;gap:8px;align-items:center}
input[type=range]{width:100%}
output{text-align:right;font-size:12px;font-weight:900}
.counter{
  position:absolute;z-index:2;left:50%;bottom:0;transform:translateX(-50%);
  width:min(1040px,100vw);height:120px;border:5px solid var(--brown);border-bottom:0;
  border-radius:24px 24px 0 0;background:linear-gradient(180deg,#efc466 0 28%,#a76232 28% 100%);
}
@media(max-width:900px){
  h1{font-size:31px}.sub{font-size:12px}
  .speech{left:12px;right:12px;top:82px;width:auto;font-size:12px}
  .panel{left:10px;right:10px;top:168px;width:auto;max-height:calc(100vh - 180px)}
  .counter{height:70px;width:72vw;left:40%;bottom:28px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>艦隊八幡社</h1>
    <div class="sub">Live2D パラメータ直接テスト v0.9b</div>
  </header>

  <canvas id="stage"></canvas>

  <div class="speech">
    <small>はちまん</small>
    <span id="speechText">パラメータが直接動くか確認するのです。</span>
  </div>

  <div class="counter"></div>

  <section class="panel">
    <h2>直接テスト</h2>
    <div class="status" id="status">読み込み準備中……<small>モデルパス：export/hachiman.model3.json</small></div>
    <div class="readout" id="readout">待機中……</div>

    <div class="btns">
      <button id="rightUpBtn">右腕 上げ</button>
      <button id="rightDownBtn">右腕 下げ</button>
      <button id="leftUpBtn">左腕 上げ</button>
      <button id="leftDownBtn">左腕 下げ</button>
      <button id="mouthOpenBtn">口 開く</button>
      <button id="mouthCloseBtn">口 閉じる</button>
      <button id="autoMouthBtn" class="green">口パク連続</button>
      <button id="resetBtn">リセット</button>
    </div>

    <div class="control">
      <b>Param / みぎうで</b>
      <div class="row"><input id="paramRange" type="range" min="-30" max="30" step="1" value="0"><output id="paramOut">0</output></div>
    </div>

    <div class="control">
      <b>Param2 / ひだりうで</b>
      <div class="row"><input id="param2Range" type="range" min="-30" max="30" step="1" value="0"><output id="param2Out">0</output></div>
    </div>

    <div class="control">
      <b>ParamMouthOpenY / 口開閉</b>
      <div class="row"><input id="mouthRange" type="range" min="0" max="1" step="0.01" value="0"><output id="mouthOut">0</output></div>
    </div>

    <div class="control">
      <b>ParamMouthForm / 口変形</b>
      <div class="row"><input id="mouthFormRange" type="range" min="-1" max="1" step="0.01" value="0"><output id="mouthFormOut">0</output></div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const MODEL_PATH="export/hachiman.model3.json";

const canvas=document.getElementById("stage");
const statusEl=document.getElementById("status");
const readout=document.getElementById("readout");
const speechText=document.getElementById("speechText");

const paramRange=document.getElementById("paramRange");
const param2Range=document.getElementById("param2Range");
const mouthRange=document.getElementById("mouthRange");
const mouthFormRange=document.getElementById("mouthFormRange");
const paramOut=document.getElementById("paramOut");
const param2Out=document.getElementById("param2Out");
const mouthOut=document.getElementById("mouthOut");
const mouthFormOut=document.getElementById("mouthFormOut");

let app=null;
let model=null;
let core=null;
let params=[];
let directValues={
  Param:0,
  Param2:0,
  ParamMouthOpenY:0,
  ParamMouthForm:0
};
let autoMouth=false;

function setStatus(text,detail){
  statusEl.innerHTML=text+"<small>モデルパス："+MODEL_PATH+"</small>"+(detail?"<small>"+detail+"</small>":"");
}
function getClass(){
  if(window.PIXI&&PIXI.live2d&&PIXI.live2d.Live2DModel)return PIXI.live2d.Live2DModel;
  if(window.Live2DModel)return window.Live2DModel;
  if(window.PIXI&&PIXI.Live2DModel)return PIXI.Live2DModel;
  return null;
}
function idToString(id){
  if(id==null)return"";
  if(typeof id==="string")return id;
  if(id.s)return id.s;
  if(id.id)return id.id;
  if(id._id)return id._id;
  if(id.toString)return id.toString();
  return String(id);
}
function collectParams(){
  core=model&&model.internalModel&&model.internalModel.coreModel;
  const out=[];
  try{
    if(core&&core.getParameterCount&&core.getParameterId){
      for(let i=0;i<core.getParameterCount();i++){
        out.push({index:i,id:idToString(core.getParameterId(i))});
      }
    }
  }catch(e){}
  return out.filter(p=>p.id);
}
function findParam(id){
  return params.find(p=>p.id===id);
}
function trySet(id,value){
  const p=findParam(id);
  let ok=false;
  try{
    if(core&&core.setParameterValueById){
      core.setParameterValueById(id,Number(value));
      ok=true;
    }
  }catch(e){}
  try{
    if(p&&core&&core.setParameterValue){
      core.setParameterValue(p.index,Number(value));
      ok=true;
    }
  }catch(e){}
  try{
    if(model&&model.internalModel&&model.internalModel.coreModel&&p){
      model.internalModel.coreModel.setParameterValueById(id,Number(value));
      ok=true;
    }
  }catch(e){}
  return ok;
}
function tryGet(id){
  const p=findParam(id);
  try{
    if(core&&core.getParameterValueById)return Number(core.getParameterValueById(id));
  }catch(e){}
  try{
    if(p&&core&&core.getParameterValue)return Number(core.getParameterValue(p.index));
  }catch(e){}
  return NaN;
}
function applyDirect(){
  trySet("Param",directValues.Param);
  trySet("Param2",directValues.Param2);
  trySet("ParamMouthOpenY",directValues.ParamMouthOpenY);
  trySet("ParamMouthForm",directValues.ParamMouthForm);

  paramRange.value=directValues.Param;
  param2Range.value=directValues.Param2;
  mouthRange.value=directValues.ParamMouthOpenY;
  mouthFormRange.value=directValues.ParamMouthForm;

  paramOut.value=Number(directValues.Param).toFixed(0);
  param2Out.value=Number(directValues.Param2).toFixed(0);
  mouthOut.value=Number(directValues.ParamMouthOpenY).toFixed(2);
  mouthFormOut.value=Number(directValues.ParamMouthForm).toFixed(2);

  const ids=["Param","Param2","ParamMouthOpenY","ParamMouthForm","ParamBreath","ParamBodyAngleX","ParamBodyAngleY","ParamBodyAngleZ"];
  const lines=[
    "登録パラメータ数："+params.length,
    "Paramあり："+(!!findParam("Param")),
    "Param2あり："+(!!findParam("Param2")),
    "ParamMouthOpenYあり："+(!!findParam("ParamMouthOpenY")),
    "ParamMouthFormあり："+(!!findParam("ParamMouthForm"))
  ];
  ids.forEach(id=>{
    const v=tryGet(id);
    lines.push(id+"： "+(Number.isFinite(v)?v.toFixed(3):"取得不可"));
  });
  readout.innerHTML=lines.map(x=>"<small>"+x+"</small>").join("");
}
function placeModel(){
  if(!model||!app)return;
  const w=app.renderer.width,h=app.renderer.height;
  if(window.innerWidth<=900){
    model.scale.set(0.050);
    model.x=185;
    model.y=492;
  }else{
    model.scale.set(0.220);
    model.x=w*0.50;
    model.y=h*0.70;
  }
  if(model.anchor)model.anchor.set(0.5,0.92);
}
function tick(){
  requestAnimationFrame(tick);
  if(!model)return;
  if(autoMouth){
    const t=performance.now()/1000;
    directValues.ParamMouthOpenY=(Math.sin(t*14)>0)?1:0;
    directValues.ParamMouthForm=Math.sin(t*6);
  }
  applyDirect();
}
async function init(){
  try{
    const C=getClass();
    if(!C)throw new Error("Live2DModel クラスが見つかりません。");

    app=new PIXI.Application({
      view:canvas,
      resizeTo:window,
      transparent:true,
      autoDensity:false,
      resolution:1
    });

    setStatus("Live2Dモデルを読み込み中……");

    model=await C.from(MODEL_PATH,{autoInteract:false});
    app.stage.addChild(model);

    if(model.anchor)model.anchor.set(0.5,0.92);

    params=collectParams();
    placeModel();

    setStatus("読み込み成功。直接テストできます。","取得パラメータ："+params.length+"件");
    speechText.textContent="スライダーで、直接パラメータを動かしてほしいのです。";

    window.addEventListener("resize",placeModel);
    tick();
  }catch(e){
    console.error(e);
    setStatus("読み込み失敗："+e.message);
    speechText.textContent="Live2Dの読み込みに失敗したのです。";
  }
}

paramRange.addEventListener("input",()=>{directValues.Param=Number(paramRange.value);});
param2Range.addEventListener("input",()=>{directValues.Param2=Number(param2Range.value);});
mouthRange.addEventListener("input",()=>{autoMouth=false;directValues.ParamMouthOpenY=Number(mouthRange.value);});
mouthFormRange.addEventListener("input",()=>{directValues.ParamMouthForm=Number(mouthFormRange.value);});

document.getElementById("rightUpBtn").onclick=()=>{directValues.Param=30;speechText.textContent="右腕を上げるのです。";};
document.getElementById("rightDownBtn").onclick=()=>{directValues.Param=-30;speechText.textContent="右腕を下げるのです。";};
document.getElementById("leftUpBtn").onclick=()=>{directValues.Param2=-30;speechText.textContent="左腕を上げるのです。";};
document.getElementById("leftDownBtn").onclick=()=>{directValues.Param2=30;speechText.textContent="左腕を下げるのです。";};
document.getElementById("mouthOpenBtn").onclick=()=>{autoMouth=false;directValues.ParamMouthOpenY=1;speechText.textContent="口を開くのです。";};
document.getElementById("mouthCloseBtn").onclick=()=>{autoMouth=false;directValues.ParamMouthOpenY=0;speechText.textContent="口を閉じるのです。";};
document.getElementById("autoMouthBtn").onclick=()=>{autoMouth=!autoMouth;speechText.textContent=autoMouth?"口パク連続テストなのです。":"口パクを止めたのです。";};
document.getElementById("resetBtn").onclick=()=>{autoMouth=false;directValues={Param:0,Param2:0,ParamMouthOpenY:0,ParamMouthForm:0};speechText.textContent="リセットしたのです。";};

init();
</script>
</body>
</html>
