<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公式ゲームセンター入口</title>
<style>
  :root {
    --ink: #4a2c1a;
    --brown: #6e3d24;
    --red: #c53725;
    --cream: #fff8df;
    --paper: #fff9e8;
    --gold: #f0d58b;
    --green: #4b8f76;
  }

  * {
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    padding: 18px;
    color: var(--ink);
    background:
      linear-gradient(rgba(255, 248, 223, 0.92), rgba(255, 248, 223, 0.92)),
      repeating-linear-gradient(0deg, #f4df9e 0 18px, #efd48b 18px 21px);
    font-family: "Yu Gothic", "YuGothic", "Hiragino Sans", "Meiryo", sans-serif;
  }

  .entrance {
    width: min(680px, 100%);
    min-height: min(520px, calc(100vh - 36px));
    display: grid;
    place-items: center;
    padding: 28px;
    text-align: center;
    background: var(--paper);
    border: 5px solid var(--brown);
    box-shadow: 10px 10px 0 rgba(74, 44, 26, 0.18);
  }

  .inner {
    width: min(460px, 100%);
  }

  h1 {
    margin: 0 0 24px;
    color: var(--red);
    font-size: clamp(28px, 6vw, 44px);
    letter-spacing: 0.06em;
    line-height: 1.25;
    text-shadow: 2px 2px 0 #fff1c4;
  }

  .official-button {
    display: inline-grid;
    place-items: center;
    width: min(390px, 100%);
    min-height: 76px;
    padding: 16px 22px;
    color: #fff8df;
    background: var(--red);
    border: 4px solid #7a261b;
    box-shadow: 0 8px 0 #7a261b;
    font-size: clamp(20px, 4.8vw, 30px);
    font-weight: 900;
    text-decoration: none;
    touch-action: manipulation;
  }

  .official-button:active {
    transform: translateY(6px);
    box-shadow: 0 2px 0 #7a261b;
  }

  .message {
    margin: 24px auto 0;
    padding: 14px 16px;
    color: var(--ink);
    background: #fff1c4;
    border: 3px solid var(--brown);
    font-size: clamp(17px, 3.8vw, 22px);
    font-weight: 900;
    line-height: 1.6;
  }

  .message-name {
    display: block;
    margin-top: 8px;
    color: #765035;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    body {
      padding: 10px;
    }

    .entrance {
      min-height: calc(100vh - 20px);
      padding: 18px;
      border-width: 4px;
      box-shadow: 6px 6px 0 rgba(74, 44, 26, 0.18);
    }

    h1 {
      margin-bottom: 18px;
    }

    .official-button {
      min-height: 64px;
      padding: 12px 14px;
    }

    .message {
      margin-top: 18px;
      padding: 12px;
    }
  }
</style>
</head>
<body>
  <main class="entrance" aria-label="公式ゲームセンター入口">
    <div class="inner">
      <h1>艦隊八幡社<br>ゲームセンター</h1>
      <a class="official-button" href="https://kantaihachiman.github.io/game-center/">
        公式ゲームセンター入口へ
      </a>
      <p class="message">
        こちらへ移動お願いしますのです。
        <span class="message-name">はちまんより</span>
      </p>
    </div>
  </main>
</body>
</html>
