<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はちまん Live2D スマホ小型・下寄せ配置 v0.6a</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:"Yu Gothic","Meiryo",sans-serif;color:#fff7df;background:linear-gradient(180deg,#251714,#56321f 55%,#9b6517)}
.wrap{position:relative;width:100vw;height:100vh;overflow:hidden}
#stage{position:absolute;inset:0;width:100vw;height:100vh;z-index:3}
#overlay{position:absolute;inset:0;width:100vw;height:100vh;z-index:4;pointer-events:none}
header{position:absolute;z-index:8;left:0;right:0;top:0;text-align:center;padding:12px;pointer-events:none}
h1{margin:0;font-size:clamp(26px,5vw,52px);letter-spacing:.08em;text-shadow:3px 3px 0 #3b2015}
.sub{font-weight:900;margin-top:4px}
.speech{position:absolute;z-index:10;right:24px;top:105px;width:min(430px,36vw);padding:12px 15px;color:#3f2a1e;background:#fff9e8;border:4px solid #4d2a1a;border-radius:18px;box-shadow:6px 6px 0 rgba(0,0,0,.18);font-weight:900;line-height:1.55}
.speech small{display:block;color:#7a5b42;margin-bottom:4px}
.floor{position:absolute;z-index:1;left:-10%;right:-10%;bottom:-78px;height:260px;background:repeating-linear-gradient(90deg,#b87938 0 70px,#a86931 70px 76px),linear-gradient(#c48d4f,#8f572b);transform:perspective(520px) rotateX(58deg);transform-origin:bottom;border-top:5px solid #4d2a1a}
.counter{position:absolute;z-index:2;left:50%;bottom:44px;transform:translateX(-50%);width:min(680px,70vw);height:104px;border:5px solid #3b2015;border-radius:18px 18px 8px 8px;background:linear-gradient(180deg,#f1c36a 0 25%,#a85f31 25% 100%);box-shadow:0 12px 0 rgba(52,27,17,.45)}
.sign{position:absolute;z-index:6;left:50%;bottom:125px;transform:translateX(-50%);padding:9px 20px;min-width:220px;text-align:center;color:#3f2a1e;border:4px solid #4d2a1a;background:#fff4d8;font-size:clamp(19px,3.4vw,30px);font-weight:900;letter-spacing:.08em;box-shadow:5px 5px 0 rgba(0,0,0,.18)}
.panel{position:absolute;z-index:30;left:14px;top:105px;width:390px;max-height:calc(100vh - 122px);overflow:auto;padding:12px;color:#3f2a1e;background:rgba(255,249,232,.97);border:4px solid #4d2a1a;border-radius:16px;box-shadow:7px 7px 0 rgba(0,0,0,.22)}
.panel h2{margin:0 0 8px;font-size:18px;color:#9f2f26}
.status,.measure{padding:8px;border:2px solid #7a4a2c;border-radius:10px;background:#fff4d8;font-weight:900;line-height:1.45;margin-bottom:10px}
.status small,.measure small{display:block;color:#7a5b42;word-break:break-all}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
button{padding:9px 10px;color:#fff7df;background:#9f2f26;border:3px solid #4d2a1a;border-radius:10px;box-shadow:0 3px 0 #5c2219;font-family:inherit;font-weight:900;cursor:pointer}
button:active{transform:translateY(2px);box-shadow:0 1px 0 #5c2219}
button.subbtn{background:#3f735d;box-shadow:0 3px 0 #254537}
.sliders{display:grid;gap:8px;margin-bottom:10px}
.control{padding:8px;border:2px solid #7a4a2c;border-radius:10px;background:#fffdf3}
.control b{display:block;font-size:13px;margin-bottom:5px}
.control .row{display:grid;grid-template-columns:1fr 58px;gap:8px;align-items:center}
.control input[type=range]{width:100%}
.control output{text-align:right;font-size:12px;font-weight:900}
.note{font-size:12px;line-height:1.5;color:#6b4b35;font-weight:800}
.mobileBar{display:none}
@media(max-width:900px){
body{overflow:hidden}.wrap{height:100vh;min-height:100vh}
header{padding-top:10px}h1{font-size:30px}.sub{font-size:12px}
.speech{left:12px;right:12px;top:72px;width:auto;min-height:58px;font-size:12px;padding:9px 11px}
.floor{bottom:18px;height:185px}.counter{bottom:70px;width:min(520px,86vw);height:80px}.sign{bottom:138px;min-width:180px;font-size:20px;padding:7px 12px}
.panel{display:none;position:fixed;z-index:50;left:10px;right:10px;top:90px;width:auto;max-height:calc(100vh - 150px);overflow:auto}
.panel.open{display:block}
.mobileBar{display:flex;position:fixed;z-index:60;left:8px;right:8px;bottom:8px;gap:6px}
.mobileBar button{flex:1;padding:8px 6px;font-size:12px}
}
</style>
</head>
<body>
<div class="wrap">
<header><h1>艦隊八幡社</h1><div class="sub">Live2D スマホ小型・下寄せ配置 v0.6a</div></header>
<canvas id="stage"></canvas>
<canvas id="overlay"></canvas>
<div class="floor"></div><div class="counter"></div><div class="sign">艦隊八幡社</div>
<div class="speech"><small>はちまん</small><span id="speechText">スマホ小型・下寄せ配置の確認なのです。</span></div>

<section class="panel" id="panel">
<h2>原点・実寸計測</h2>
<div class="status" id="status">読み込み準備中……<small>モデルパス：export/hachiman.model3.json</small></div>
<div class="measure" id="measure">計測待ち……</div>
<div class="btns">
<button id="measureBtn" class="subbtn">再計測</button><button id="toggleBoxBtn">赤枠ON/OFF</button>
<button id="centerBtn">画面中央</button><button id="fitBtn">最適配置</button>
<button id="smallBtn">小さく</button><button id="bigBtn">大きく</button>
</div>
<h2>手動位置調整</h2>
<div class="sliders">
<div class="control"><b>model.x</b><div class="row"><input id="xRange" type="range" min="-1200" max="1200" step="1"><output id="xOut">0</output></div></div>
<div class="control"><b>model.y</b><div class="row"><input id="yRange" type="range" min="-1200" max="1600" step="1"><output id="yOut">0</output></div></div>
<div class="control"><b>scale</b><div class="row"><input id="sRange" type="range" min="0.005" max="1.000" step="0.005"><output id="sOut">0</output></div></div>
<div class="control"><b>anchor.x</b><div class="row"><input id="axRange" type="range" min="-2" max="2" step="0.01"><output id="axOut">0</output></div></div>
<div class="control"><b>anchor.y</b><div class="row"><input id="ayRange" type="range" min="-2" max="2" step="0.01"><output id="ayOut">0</output></div></div>
</div>
<div class="note">v0.6aでは、PCは scale 0.26、スマホは scale 0.05 を基準にしています。赤枠と青十字で確認できます。</div>
</section>

<div class="mobileBar">
<button id="mobilePanelBtn">計測パネル</button>
<button id="mobileFitBtn">最適配置</button>
<button id="mobileBoxBtn">赤枠</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
<script>
const MODEL_PATH="export/hachiman.model3.json";
const canvas=document.getElementById("stage"),overlay=document.getElementById("overlay"),statusEl=document.getElementById("status"),measureEl=document.getElementById("measure"),speechText=document.getElementById("speechText"),panel=document.getElementById("panel");
const xRange=document.getElementById("xRange"),yRange=document.getElementById("yRange"),sRange=document.getElementById("sRange"),axRange=document.getElementById("axRange"),ayRange=document.getElementById("ayRange");
const xOut=document.getElementById("xOut"),yOut=document.getElementById("yOut"),sOut=document.getElementById("sOut"),axOut=document.getElementById("axOut"),ayOut=document.getElementById("ayOut");
let app=null,model=null,showBox=false;
function setStatus(t,d){statusEl.innerHTML=t+"<small>モデルパス："+MODEL_PATH+"</small>"+(d?"<small>"+d+"</small>":"")}
function getClass(){if(window.PIXI&&PIXI.live2d&&PIXI.live2d.Live2DModel)return PIXI.live2d.Live2DModel;if(window.Live2DModel)return window.Live2DModel;if(window.PIXI&&PIXI.Live2DModel)return PIXI.Live2DModel;return null}
function resizeOverlay(){const dpr=window.devicePixelRatio||1;overlay.width=Math.floor(window.innerWidth*dpr);overlay.height=Math.floor(window.innerHeight*dpr);overlay.style.width=window.innerWidth+"px";overlay.style.height=window.innerHeight+"px";overlay.getContext("2d").setTransform(dpr,0,0,dpr,0,0)}
function updateControls(){if(!model)return;xRange.value=model.x;yRange.value=model.y;sRange.value=model.scale.x;xOut.value=Math.round(model.x);yOut.value=Math.round(model.y);sOut.value=model.scale.x.toFixed(3);if(model.anchor){axRange.value=model.anchor.x;ayRange.value=model.anchor.y;axOut.value=model.anchor.x.toFixed(2);ayOut.value=model.anchor.y.toFixed(2)}}
function measureAndDraw(){
 if(!model||!app)return;
 resizeOverlay();
 const ctx=overlay.getContext("2d");ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
 let b=null;try{b=model.getBounds()}catch(e){}
 const info=[];info.push("画面： "+Math.round(app.renderer.width)+" × "+Math.round(app.renderer.height));info.push("model.x / y： "+Math.round(model.x)+" / "+Math.round(model.y));info.push("scale： "+model.scale.x.toFixed(4));if(model.anchor)info.push("anchor： "+model.anchor.x.toFixed(2)+" / "+model.anchor.y.toFixed(2));
 if(b){info.push("bounds.x / y： "+Math.round(b.x)+" / "+Math.round(b.y));info.push("bounds.w / h： "+Math.round(b.width)+" / "+Math.round(b.height));info.push("bounds右端： "+Math.round(b.x+b.width));info.push("bounds下端： "+Math.round(b.y+b.height));if(showBox){ctx.save();ctx.lineWidth=3;ctx.strokeStyle="rgba(255,40,40,.95)";ctx.fillStyle="rgba(255,40,40,.08)";ctx.fillRect(b.x,b.y,b.width,b.height);ctx.strokeRect(b.x,b.y,b.width,b.height);ctx.restore()}}else{info.push("bounds：取得失敗")}
 ctx.save();ctx.strokeStyle="rgba(60,160,255,.95)";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(model.x-24,model.y);ctx.lineTo(model.x+24,model.y);ctx.moveTo(model.x,model.y-24);ctx.lineTo(model.x,model.y+24);ctx.stroke();ctx.fillStyle="rgba(60,160,255,.95)";ctx.font="bold 13px sans-serif";ctx.fillText("origin",model.x+8,model.y-8);ctx.restore();
 measureEl.innerHTML=info.map(x=>"<small>"+x+"</small>").join("");updateControls();
}
function applyFit(){
 if(!model||!app)return;const w=app.renderer.width,h=app.renderer.height,isMobile=w<=700;
 if(isMobile){model.scale.set(0.035);model.x=w*0.04;model.y=h*0.50;if(model.anchor)model.anchor.set(0.5,0.92)}
 else{model.scale.set(0.26);model.x=w*0.5;model.y=h*0.80;if(model.anchor)model.anchor.set(0.5,0.92)}
 speechText.textContent="最適配置しましたのです。赤枠を見て位置を確認してほしいのです。";measureAndDraw();
}
function centerModel(){if(!model||!app)return;model.x=app.renderer.width*0.5;model.y=app.renderer.height*0.55;measureAndDraw()}
function bindControls(){xRange.addEventListener("input",()=>{model.x=Number(xRange.value);measureAndDraw()});yRange.addEventListener("input",()=>{model.y=Number(yRange.value);measureAndDraw()});sRange.addEventListener("input",()=>{model.scale.set(Number(sRange.value));measureAndDraw()});axRange.addEventListener("input",()=>{if(model.anchor)model.anchor.x=Number(axRange.value);measureAndDraw()});ayRange.addEventListener("input",()=>{if(model.anchor)model.anchor.y=Number(ayRange.value);measureAndDraw()})}
async function init(){
 try{const C=getClass();if(!C)throw new Error("Live2DModel クラスが見つかりません。");resizeOverlay();app=new PIXI.Application({view:canvas,resizeTo:window,transparent:true,autoDensity:true,resolution:window.devicePixelRatio||1});setStatus("Live2Dモデルを読み込み中……");model=await C.from(MODEL_PATH,{autoInteract:true});app.stage.addChild(model);if(model.anchor)model.anchor.set(0.5,0.92);applyFit();setStatus("読み込み成功。v0.6a 小型・下寄せ配置を確認できます。");speechText.textContent="読み込み成功なのです。スマホ小型・下寄せ配置を確認してほしいのです。";bindControls();window.addEventListener("resize",()=>{resizeOverlay();applyFit()});setInterval(measureAndDraw,500)}
 catch(e){console.error(e);setStatus("読み込み失敗："+e.message);speechText.textContent="Live2Dの読み込みに失敗したのです。"}
}
document.getElementById("measureBtn").onclick=measureAndDraw;document.getElementById("toggleBoxBtn").onclick=()=>{showBox=!showBox;measureAndDraw()};document.getElementById("centerBtn").onclick=centerModel;document.getElementById("fitBtn").onclick=applyFit;document.getElementById("smallBtn").onclick=()=>{if(model){model.scale.set(Math.max(.005,model.scale.x-.01));measureAndDraw()}};document.getElementById("bigBtn").onclick=()=>{if(model){model.scale.set(model.scale.x+.01);measureAndDraw()}};
document.getElementById("mobilePanelBtn").onclick=()=>panel.classList.toggle("open");document.getElementById("mobileFitBtn").onclick=applyFit;document.getElementById("mobileBoxBtn").onclick=()=>{showBox=!showBox;measureAndDraw()};
init();
</script>
</body>
</html>
